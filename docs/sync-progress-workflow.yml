name: Sync Parallax Progress

# ── Triggers ──────────────────────────────────────────────────────────────
on:
  workflow_dispatch:          # manual "Run workflow" button in GitHub UI
  schedule:
    - cron: '0 * * * *'       # every hour — good for hackathon days
  repository_dispatch:        # fired by saras_kno_B on push to feature/parallax*
    types: [parallax-push]

# ── Permissions ───────────────────────────────────────────────────────────
permissions:
  contents: write             # needed to commit progress.json back

jobs:
  sync:
    name: Extract & publish progress
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout this (dashboard) repo so we can write progress.json
      - name: Checkout dashboard repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 3. Run the sync script
      #    GH_PAT must be a Personal Access Token with `repo` read scope on
      #    shravan-surya/saras_kno_B (the private source repo).
      #    Add it at: Settings → Secrets & variables → Actions → New secret → GH_PAT
      - name: Run sync_dashboard.py
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          python scripts/sync_dashboard.py \
            --source-repo shravan-surya/saras_kno_B \
            --output progress.json \
            --ci

      # 4. Commit & push if progress.json changed
      - name: Commit progress.json
        run: |
          git config user.name  "Parallax Sync Bot"
          git config user.email "bot@parallax-tracer.noreply.github.com"
          git add progress.json
          git diff --cached --quiet && echo "No changes to progress.json — skipping commit." && exit 0
          DONE=$(python3 -c "import json; d=json.load(open('progress.json')); print(len(d['milestone_updates']))")
          git commit -m "chore(dashboard): sync progress — ${DONE} milestones done [skip ci]

          Auto-generated by sync_dashboard.py
          Source: shravan-surya/saras_kno_B @ ${{ github.event.client_payload.sha || 'scheduled' }}

          Co-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>"
          git push
